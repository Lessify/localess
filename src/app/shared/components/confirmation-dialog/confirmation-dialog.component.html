<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p class="whitespace-pre-wrap"> {{ data.content }} </p>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="false">Cancel</button>
  <button hlmBtn variant="destructive" [mat-dialog-close]="true">OK</button>
</mat-dialog-actions>
