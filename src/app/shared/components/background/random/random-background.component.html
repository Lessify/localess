@switch (bgIndex()) {
  @case (0) {
    <ll-beams class="absolute inset-0 size-full"></ll-beams>
  }
  @case (1) {
    <ll-beams-collision class="absolute inset-0 size-full"></ll-beams-collision>
  }
  @case (2) {
    <ll-dot-pattern class="absolute inset-0 size-full"></ll-dot-pattern>
  }
  @case (3) {
    <ll-galaxy class="absolute inset-0 size-full"></ll-galaxy>
  }
  @case (4) {
    <ll-laser-grid class="absolute inset-0 size-full"></ll-laser-grid>
  }
  @case (5) {
    <ll-matrix class="absolute inset-0 size-full"></ll-matrix>
  }
  @case (6) {
    <ll-meteors class="absolute inset-0 size-full"></ll-meteors>
  }
  @case (7) {
    <ll-pollen class="absolute inset-0 size-full"></ll-pollen>
  }
  @case (8) {
    <ll-prism class="absolute inset-0 size-full"></ll-prism>
  }
  @case (9) {
    <ll-starfield class="absolute inset-0 size-full"></ll-starfield>
  }
  @default {
    <ll-topography class="absolute inset-0 size-full"></ll-topography>
  }
}
