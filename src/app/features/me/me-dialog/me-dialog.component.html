<h2 mat-dialog-title>User</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 py-2">
    <div hlmField>
      <label hlmFieldLabel for="displayName">Display Name</label>
      <input hlmInput id="displayName" type="text" formControlName="displayName" class="w-full" />
    </div>
    <div hlmField>
      <label hlmFieldLabel for="photoURL">Avatar URL</label>
      <input hlmInput id="photoURL" type="text" formControlName="photoURL" class="w-full" />
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="undefined">Cancel</button>
  <button hlmBtn [mat-dialog-close]="form.value" [disabled]="!form.valid">Save</button>
</mat-dialog-actions>
