<h2 mat-dialog-title>Update Password</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 py-2">
    <div hlmField>
      <label hlmFieldLabel for="newPassword">New Password</label>
      <input hlmInput id="newPassword" type="password" formControlName="newPassword" class="w-full" />
      <hlm-field-description>Minimum 6 characters</hlm-field-description>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="undefined">Cancel</button>
  <button hlmBtn [mat-dialog-close]="form.value" [disabled]="!form.valid">Save</button>
</mat-dialog-actions>
