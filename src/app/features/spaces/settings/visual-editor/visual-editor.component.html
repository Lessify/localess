<div class="p-2 flex items-center justify-end gap-2">
  <button hlmBtn variant="outline" (click)="addEnvironment()">
    <ng-icon hlm size="sm" name="lucidePlus" />
    Add Environment
  </button>
  <button hlmBtn [disabled]="!form.valid" (click)="save()">
    <ng-icon hlm size="sm" name="lucideSave" />
    Save
  </button>
</div>

@if (isLoading()) {
  <hlm-progress class="h-0.5">
    <hlm-progress-indicator />
  </hlm-progress>
}

<div class="my-3">
  <form [formGroup]="form">
    <div
      hlmItemGroup
      class="overflow-y-auto gap-2"
      formArrayName="environments"
      cdkDropList
      (cdkDropListDropped)="environmentDropDrop($event)">
      @for (option of environments?.controls; track option; let idx = $index) {
        <div
          hlmItem
          role="listitem"
          cdkDrag
          variant="outline"
          [formGroupName]="idx"
          [class.border-destructive]="option.invalid"
          cdkDragPreviewContainer="parent">
          <div hlmItemContent class="gap-2">
            <div hlmItemTitle>Environment {{ idx + 1 }} </div>
            <div hlmFieldGroup>
              <div hlmField>
                <label hlmFieldLabel [for]="'name-' + idx">Name</label>
                <input
                  hlmInput
                  [id]="'name-' + idx"
                  type="text"
                  formControlName="name"
                  autocomplete="off"
                  placeholder="Production/Testing/Development" />
                @if (option.controls['name'].errors; as errors) {
                  <hlm-field-error>{{ fe.errors(errors) }}</hlm-field-error>
                }
              </div>
              <div hlmField>
                <label hlmFieldLabel [for]="'url-' + idx">Name</label>
                <input
                  hlmInput
                  [id]="'url-' + idx"
                  type="text"
                  formControlName="url"
                  autocomplete="off"
                  placeholder="https://localess.io/api/url" />
                @if (option.controls['url'].errors; as errors) {
                  <hlm-field-error>{{ fe.errors(errors) }}</hlm-field-error>
                }
              </div>
            </div>
          </div>
          <div hlmItemActions class="mb-auto">
            <button hlmBtn size="icon" variant="outline" (click)="removeEnvironment(idx)" hlmTooltip="Delete">
              <ng-icon hlm size="sm" name="lucideTrash" />
            </button>
            <button hlmBtn size="icon" variant="ghost" cdkDragHandle class="cursor-grab active:cursor-grabbing" hlmTooltip="Move">
              <ng-icon hlm size="sm" name="lucideGripVertical" />
            </button>
          </div>
        </div>
      }
    </div>
  </form>
</div>
