<div class="flex items-center justify-end gap-2 p-2">
  <button hlmBtn (click)="openAddDialog()">
    <ng-icon hlm size="sm" name="lucidePlus" />
    Add Locale
  </button>
</div>
@if (isLoading()) {
  <hlm-progress class="h-0.5">
    <hlm-progress-indicator />
  </hlm-progress>
}
<div class="my-3">
  <ll-filter-toolbar class="mb-3" (filterChange)="onFilterChange($event)" />
  <div llTableContainer>
    <table ll-table [dataSource]="dataSource" llTableSort>
      <ng-container llColumnDef="id">
        <th llHeaderCell *llHeaderCellDef llTableSortHeader="id">Id</th>
        <td llCell *llCellDef="let element">{{ element.id }}</td>
      </ng-container>
      <ng-container llColumnDef="name">
        <th llHeaderCell *llHeaderCellDef llTableSortHeader="name">Name</th>
        <td llCell *llCellDef="let element">{{ element.name }}</td>
      </ng-container>
      <ng-container llColumnDef="isTranslatable">
        <th llHeaderCell *llHeaderCellDef>Translatable</th>
        <td llCell *llCellDef="let element">
          @if (isSupport(element.id)) {
            <ng-icon name="lucideCheck" />
          } @else {
            <ng-icon name="lucideX" />
          }
        </td>
      </ng-container>
      <ng-container llColumnDef="isFallback">
        <th llHeaderCell *llHeaderCellDef>Fallback</th>
        <td llCell *llCellDef="let element">
          @if (spaceStore.selectedSpace()?.localeFallback?.id === element.id) {
            <ng-icon name="lucideCheck" />
          }
        </td>
      </ng-container>
      <ng-container llColumnDef="actions">
        <th llHeaderCell *llHeaderCellDef>Actions</th>
        <td llCell *llCellDef="let element">
          <button hlmBtn size="icon" variant="ghost" [hlmDropdownMenuTrigger]="actionsMenu" (click)="$event.stopPropagation()">
            <ng-icon hlm size="sm" name="lucideEllipsisVertical" />
          </button>
          <ng-template #actionsMenu>
            <hlm-dropdown-menu class="text-nowrap">
              @if (spaceStore.selectedSpace()?.localeFallback?.id !== element.id) {
                <hlm-dropdown-menu-group>
                  <button hlmDropdownMenuItem (click)="markAsFallback(element)">
                    <ng-icon hlm size="sm" name="lucideCheck" />
                    Set as Fallback
                  </button>
                </hlm-dropdown-menu-group>
                <hlm-dropdown-menu-separator />
              }
              <hlm-dropdown-menu-group>
                <button
                  hlmDropdownMenuItem
                  variant="destructive"
                  [disabled]="spaceStore.selectedSpace()?.localeFallback?.id === element.id"
                  (click)="openDeleteDialog(element)">
                  <ng-icon hlm size="sm" name="lucideTrash" />
                  Delete
                </button>
              </hlm-dropdown-menu-group>
            </hlm-dropdown-menu>
          </ng-template>
        </td>
      </ng-container>
      <tr ll-header-row *llHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr ll-row *llRowDef="let row; columns: displayedColumns"></tr>
      <tr *llNoDataRow>
        <td [attr.colspan]="displayedColumns.length">No locales yet.</td>
      </tr>
    </table>
  </div>

  <ll-paginator [sticky]="true" [length]="dataSource.filteredData().length" />
</div>
