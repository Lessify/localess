<h2 mat-dialog-title>Translations Export</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 py-2">
    <div hlmField>
      <label hlmFieldLabel for="kind">Type</label>
      <hlm-select id="kind" formControlName="kind" [itemToString]="kindItemToString">
        <hlm-select-trigger class="w-full">
          <hlm-select-value />
        </hlm-select-trigger>
        <hlm-select-content *hlmSelectPortal>
          @for (kind of exportKinds; track kind.key) {
            <hlm-select-item [value]="kind.key">{{ kind.value }}</hlm-select-item>
          }
        </hlm-select-content>
      </hlm-select>
    </div>

    @if (form.value.kind === 'FLAT') {
      <div hlmField>
        <label hlmFieldLabel for="locale">Locale</label>
        <hlm-select id="locale" formControlName="locale" [itemToString]="localeItemToString">
          <hlm-select-trigger class="w-full">
            <hlm-select-value placeholder="Select locale..." />
          </hlm-select-trigger>
          <hlm-select-content *hlmSelectPortal>
            @for (locale of data.locales; track locale.id) {
              <hlm-select-item [value]="locale.id">{{ locale.name }}</hlm-select-item>
            }
          </hlm-select-content>
        </hlm-select>
      </div>
    }

    <div hlmField>
      <label hlmFieldLabel for="fromDate">From Date</label>
      <div hlmInputGroup>
        <input hlmInputGroupInput id="fromDate" type="date" [max]="todayIso" #dateInput (change)="dateChange($event)" />
        <button hlmInputGroupButton type="button" variant="ghost" (click)="clearDate(dateInput)">
          <ng-icon hlm size="sm" name="lucideX" />
        </button>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="undefined">Cancel</button>
  <button hlmBtn [mat-dialog-close]="form.value" [disabled]="!form.valid">
    <ng-icon hlm size="sm" name="lucideCloudDownload" />
    Export
  </button>
</mat-dialog-actions>
