<h2 mat-dialog-title>Assets Export</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 py-2">
    <div hlmField>
      <label hlmFieldLabel for="path">Path</label>
      <hlm-combobox
        id="path"
        [(search)]="search"
        [filter]="noOpFilter"
        [value]="selectedItem()"
        (valueChange)="onValueChange($event)"
        [itemToString]="displayItem">
        <hlm-combobox-input placeholder="Search file or folder..." showClear />
        <hlm-combobox-content *hlmComboboxPortal>
          <hlm-combobox-empty>No results found.</hlm-combobox-empty>
          <div hlmComboboxList>
            @for (asset of filteredAssets(); track asset.id) {
              <hlm-combobox-item [value]="asset">
                <ng-icon hlm size="sm" [name]="asset.kind === 'FOLDER' ? 'lucideFolder' : 'lucidePaperclip'" />
                {{ asset.name }}
              </hlm-combobox-item>
            }
          </div>
        </hlm-combobox-content>
      </hlm-combobox>
      <hlm-field-description>Will export only a specific File or Folder with sub-files.</hlm-field-description>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="undefined">Cancel</button>
  <button hlmBtn [mat-dialog-close]="form.value">
    <ng-icon hlm size="sm" name="lucideCloudDownload" />
    Export
  </button>
</mat-dialog-actions>
