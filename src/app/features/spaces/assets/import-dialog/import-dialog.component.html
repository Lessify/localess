<h2 mat-dialog-title>Assets Import</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 py-2">
    <div class="flex items-center gap-3">
      <button hlmBtn variant="outline" type="button" (click)="fileInput.click()">
        <ng-icon hlm size="sm" name="lucideUpload" />
        Upload File
      </button>
      @if (fileName) {
        <p class="text-muted-foreground text-sm">{{ fileName }}</p>
      }
    </div>
    @if (fileWrong) {
      <p class="text-destructive text-sm">The selected file does not comply with import extension (<b>*.lla.zip</b>).</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="flex gap-2">
  <button hlmBtn variant="outline" [mat-dialog-close]="undefined">Cancel</button>
  <button hlmBtn [mat-dialog-close]="form.value" [disabled]="!form.valid">
    <ng-icon hlm size="sm" name="lucideUploadCloud" />
    Import
  </button>
</mat-dialog-actions>
<input hidden type="file" accept=".lla.zip" #fileInput (change)="onFileChange($event)" />
