<mat-toolbar class="border-b">
  <mat-toolbar-row>
    User Interface
    <span class="spacer"></span>
    <div class="actions">
      <button mat-flat-button [disabled]="!form.valid" (click)="save()">
        <mat-icon>save</mat-icon>
        Save
      </button>
    </div>
  </mat-toolbar-row>
</mat-toolbar>

@if (isLoading()) {
  <hlm-progress class="h-0.5">
    <hlm-progress-indicator />
  </hlm-progress>
}

<div class="my-3">
  <form [formGroup]="form">
    <mat-form-field>
      <mat-label>Color</mat-label>
      <mat-select formControlName="color">
        <mat-option value="primary">Primary</mat-option>
        <mat-option value="secondary">Secondary</mat-option>
        <mat-option value="outline">Outline</mat-option>
        <mat-option value="destructive">Destructive</mat-option>
      </mat-select>
      @if (form.controls['color'].errors; as errors) {
        <mat-error>{{ fe.errors(errors) }}</mat-error>
      }
    </mat-form-field>
    <br />
    <mat-form-field>
      <mat-label>Text</mat-label>
      <input matInput type="text" formControlName="text" maxlength="30" autocomplete="off" />
      <mat-hint align="end">{{ form.controls['text'].value?.length || 0 }}/30</mat-hint>
      @if (form.controls['text'].errors; as errors) {
        <mat-error>{{ fe.errors(errors) }}</mat-error>
      }
    </mat-form-field>
  </form>
</div>
